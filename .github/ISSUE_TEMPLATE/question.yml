name: Question
description: Ask a usage or troubleshooting question.
title: '[Question]: '
labels:
- question
- triage
body:
- type: textarea
  id: question
  attributes:
    label: Question
    description: What are you trying to do?
  validations:
    required: true
- type: textarea
  id: context
  attributes:
    label: Context
    description: Include versions and redacted logs if relevant.
  validations:
    required: false
