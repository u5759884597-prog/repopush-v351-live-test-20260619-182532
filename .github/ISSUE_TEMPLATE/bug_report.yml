name: Bug report
description: Report a reproducible problem with launch-ready behavior.
title: '[Bug]: '
labels:
- bug
- triage
body:
- type: markdown
  attributes:
    value: Thanks for reporting a bug. Remove secrets from logs before submitting.
  validations:
    required: false
- type: textarea
  id: what-happened
  attributes:
    label: What happened?
    description: Describe the observed behavior.
    placeholder: Describe the issue
  validations:
    required: true
- type: textarea
  id: reproduction
  attributes:
    label: Reproduction steps
    description: List steps needed to reproduce.
    placeholder: 1. ...
  validations:
    required: true
- type: input
  id: version
  attributes:
    label: Version
    description: Product or package version.
  validations:
    required: true
- type: dropdown
  id: status-area
  attributes:
    label: Feature status
    options:
    - launch
    - beta
    - roadmap
    - deprecated
  validations:
    required: true
